<!DOCTYPE html>
<html>
<head>
  <title>Puzzle Page</title>
  <script>
    // Password visible in the code for anyone who opens F12!
    const PASSWORD = "prophet";

    function checkPassword() {
      const input = document.getElementById("pass").value;
      if (input === PASSWORD) {
        document.getElementById("auth").style.display = "none";
        document.getElementById("secret").style.display = "block";
      } else {
        alert("Wrong password, try again!");
      }
    }
  </script>
</head>
<body>
  <div id="auth">
    <h2>Enter password to unlock:</h2>
    <input type="password" id="pass" placeholder="Enter password here">
    <button onclick="checkPassword()">Unlock</button>
  </div>

  <div id="secret" style="display:none;">
    <h1>koo foo gee gee</h1>
  </div>
</body>
</html>
